workflows:
  android-workflow:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - watchtower
      vars:
        PACKAGE_NAME: "io.codemagic.android"
      node: v16.12.0
    scripts:
      - name: Extract Source Code Zip
        script: |
          echo "Extracting zip file..."
          unzip *.zip
          rm *.zip
          ls -la
      - name: Set up local.properties
        script: |
          cd * && echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build Android APK
        script: |
          cd * && chmod +x gradlew && ./gradlew assembleDebug
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
      
