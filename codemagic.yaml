workflows:
  android-workflow:
    name: Android Debug APK
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      groups:
        - watchtower
      vars:
        PACKAGE_NAME: "io.codemagic.android"
      node: v16.12.0
    scripts:
      - name: Check Zip Contents
        script: |
          echo "Extracting zip file..."
          unzip *.zip
          rm *.zip
          echo "--- Listing all files inside the directory ---"
          find . -maxdepth 3
          
